<!DOCTYPE html>
<html>
<head>
  <title>Qainar's Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .email {
      color: #cbd5e1;
      margin-bottom: 35px;
    }

    input, textarea {
      width: 90%;
      max-width: 480px;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
    }

    textarea {
      height: 90px;
      resize: none;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .send-btn {
      background: #38bdf8;
      color: #0f172a;
      margin-top: 10px;
    }

    .comment {
      background: rgba(15,23,42,0.85);
      margin: 15px auto;
      padding: 18px;
      border-radius: 18px;
      width: 90%;
      max-width: 480px;
      text-align: left;
      box-shadow: 0 8px 25px rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .comment-name {
      margin: 0;
      font-weight: bold;
      color: #38bdf8;
      font-size: 17px;
    }

    .comment-text {
      margin: 8px 0 15px;
      color: #e5e7eb;
      line-height: 1.5;
    }

    .like-btn {
      background: #334155;
      color: white;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      margin-left: 10px;
    }

    .back {
      display: inline-block;
      margin-top: 30px;
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>Contact Me</h1>
      <p class="email">Email: kkay05925@gmail.com</p>

      <h2>Leave a Comment</h2>

      <input id="name" placeholder="Your name">
      <br>

      <textarea id="message" placeholder="Write your comment..."></textarea>
      <br>

      <button class="send-btn" onclick="sendComment()">Send Comment</button>

      <h2>Comments</h2>
      <div id="comments"></div>

      <a class="back" href="index.html">← Back Home</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      doc,
      updateDoc,
      deleteDoc,
      increment
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhn0e4HtF_jnSu4I4JlLgpB8rz_Qnrmpo",
      authDomain: "qainar-website.firebaseapp.com",
      projectId: "qainar-website",
      storageBucket: "qainar-website.firebasestorage.app",
      messagingSenderId: "728286957196",
      appId: "1:728286957196:web:c8d7e04c690cd76f2535a9",
      measurementId: "G-X73HSPDGYB"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadComments() {
      const commentsDiv = document.getElementById("comments");
      commentsDiv.innerHTML = "";

      const querySnapshot = await getDocs(collection(db, "comments"));

      querySnapshot.forEach((item) => {
        const data = item.data();
        const likes = data.likes || 0;

        commentsDiv.innerHTML = `
          <div class="comment">
            <p class="comment-name">${data.name}</p>
            <p class="comment-text">${data.message}</p>

            <button class="like-btn" onclick="likeComment('${item.id}')">
              👍 ${likes}
            </button>

            <button class="delete-btn" onclick="deleteComment('${item.id}')">
              Delete
            </button>
          </div>
        ` + commentsDiv.innerHTML;
      });
    }

    window.sendComment = async function () {
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (name === "" || message === "") {
        alert("Please write your name and comment.");
        return;
      }

      await addDoc(collection(db, "comments"), {
        name: name,
        message: message,
        likes: 0,
        time: new Date()
      });

      document.getElementById("name").value = "";
      document.getElementById("message").value = "";

      loadComments();
    };

    window.likeComment = async function (id) {
      await updateDoc(doc(db, "comments", id), {
        likes: increment(1)
      });

      loadComments();
    };

    window.deleteComment = async function (id) {
  const password = prompt("Enter admin password:");

  if (password !== "05925") {
    alert("Wrong password.");
    return;
  }

  const confirmDelete = confirm("Delete this comment?");
  if (!confirmDelete) return;

  await deleteDoc(doc(db, "comments", id));
  loadComments();
};

    async function checkIncomingComment() {
      const name = localStorage.getItem("newCommentName");
      const message = localStorage.getItem("newCommentMessage");

      if (name && message) {
        await addDoc(collection(db, "comments"), {
          name: name,
          message: message,
          likes: 0,
          time: new Date()
        });

        localStorage.removeItem("newCommentName");
        localStorage.removeItem("newCommentMessage");
      }

      loadComments();
    }

    checkIncomingComment();
  </script>

</body>
</html>
