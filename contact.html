<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Qainar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:  #38bdf8;
      --accent2: #2563eb;
      --glow:    rgba(56,189,248,0.85);
      --glass:   rgba(255,255,255,0.07);
      --glass-b: rgba(255,255,255,0.14);
      --muted:   #94a3b8;
      --r: 20px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #020817;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    #cursor {
      position: fixed; width:12px; height:12px; border-radius:50%;
      background: var(--accent); pointer-events:none; z-index:99999;
      transform:translate(-50%,-50%); mix-blend-mode:screen;
      transition: width .2s, height .2s;
    }
    #cursor-ring {
      position: fixed; width:36px; height:36px; border-radius:50%;
      border:1.5px solid rgba(56,189,248,0.5); pointer-events:none; z-index:99998;
      transform:translate(-50%,-50%);
      transition: width .35s cubic-bezier(.16,1,.3,1), height .35s cubic-bezier(.16,1,.3,1), left .08s linear, top .08s linear;
    }
    body:has(a:hover) #cursor,
    body:has(button:hover) #cursor,
    body:has(input:hover) #cursor,
    body:has(textarea:hover) #cursor { width:20px; height:20px; background:#fff; }
    body:has(a:hover) #cursor-ring,
    body:has(button:hover) #cursor-ring { width:52px; height:52px; border-color:rgba(56,189,248,0.9); }

    /* ── MOUSE GLOW ── */
    #mouse-glow {
      position:fixed; width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);
      pointer-events:none; z-index:0;
      transform:translate(-50%,-50%);
      transition: left .15s ease, top .15s ease;
    }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position:fixed; top:0; left:0; height:3px; width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      z-index:9999; transition:width .1s;
      box-shadow:0 0 12px var(--accent);
    }

    /* ── STAR CANVAS ── */
    #star-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    /* ── HEADER ── */
    header {
      position:fixed; top:0; width:100%;
      padding:18px 60px;
      display:flex; justify-content:space-between; align-items:center;
      z-index:1000;
      background:rgba(2,8,23,0.85);
      backdrop-filter:blur(24px);
      border-bottom:1px solid var(--glass-b);
      box-shadow:0 4px 30px rgba(0,0,0,0.4);
    }
    .logo {
      font-family:'Orbitron',sans-serif;
      font-size:20px; font-weight:900; letter-spacing:3px;
      background:linear-gradient(135deg,#fff 30%,var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      cursor:pointer;
    }
    nav { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    nav a {
      color:white; text-decoration:none;
      font-weight:700; font-size:14px; opacity:0.8;
      transition:.25s; position:relative;
    }
    nav a::after {
      content:''; position:absolute; bottom:-3px; left:0;
      width:0; height:2px; background:var(--accent); transition:width .25s;
    }
    nav a:hover { opacity:1; color:var(--accent); }
    nav a:hover::after { width:100%; }

    /* hamburger */
    .hamburger {
      display:none; flex-direction:column; justify-content:center; align-items:center;
      width:40px; height:40px; cursor:pointer; gap:5px;
      border:1px solid var(--glass-b); background:var(--glass); border-radius:10px;
      backdrop-filter:blur(10px);
    }
    .hamburger span { display:block; width:20px; height:2px; background:white; border-radius:2px; transition:.3s; }
    .hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }

    .mobile-nav {
      position:fixed; top:0; right:-100%;
      width:min(300px,80vw); height:100vh;
      background:rgba(2,8,23,0.97);
      border-left:1px solid var(--glass-b); backdrop-filter:blur(30px);
      z-index:999; padding:90px 30px 30px;
      display:flex; flex-direction:column; gap:24px;
      transition:right .4s cubic-bezier(.16,1,.3,1);
    }
    .mobile-nav.open { right:0; }
    .mobile-nav a {
      color:white; text-decoration:none; font-size:18px; font-weight:700;
      padding:12px 0; border-bottom:1px solid var(--glass-b); transition:color .2s;
    }
    .mobile-nav a:hover { color:var(--accent); }
    .mobile-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6);
      z-index:998; display:none; backdrop-filter:blur(3px);
    }
    .mobile-overlay.open { display:block; }

    .lang-switcher { display:flex; gap:5px; }
    .lang-btn {
      border:1px solid var(--glass-b); background:var(--glass);
      color:var(--muted); font-family:'DM Sans',sans-serif;
      font-size:11px; font-weight:800; border-radius:999px;
      padding:4px 10px; cursor:pointer; transition:.2s;
    }
    .lang-btn:hover, .lang-btn.active {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-color:transparent; color:white;
    }

    /* ── PAGE LAYOUT ── */
    .page {
      position:relative; z-index:1;
      max-width:760px; margin:0 auto;
      padding:110px 24px 80px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align:center; margin-bottom:48px;
      opacity:0; animation:fadeUp .8s .1s ease forwards;
    }
    .page-tag {
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 16px; margin-bottom:20px;
      border-radius:999px;
      background:rgba(56,189,248,0.12); border:1px solid rgba(56,189,248,0.35);
      color:#7dd3fc; font-weight:700; font-size:12px;
      letter-spacing:1px; text-transform:uppercase;
    }
    .tag-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--accent); box-shadow:0 0 8px var(--accent);
      animation:pulse 2s infinite;
    }
    .page-title {
      font-family:'Orbitron',sans-serif;
      font-size:52px; line-height:1.08; margin-bottom:14px;
      background:linear-gradient(135deg,#fff 40%,var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .page-sub { color:var(--muted); font-size:16px; line-height:1.7; }
    .email-link {
      display:inline-flex; align-items:center; gap:8px;
      margin-top:14px; color:var(--accent); font-weight:700; font-size:15px;
      text-decoration:none; transition:.2s;
    }
    .email-link:hover { opacity:.75; }

    /* ── FORM CARD ── */
    .form-card {
      background:var(--glass); border:1px solid var(--glass-b);
      backdrop-filter:blur(20px); border-radius:28px;
      padding:38px 36px;
      box-shadow:0 30px 80px rgba(0,0,0,0.4);
      opacity:0; animation:fadeUp .8s .25s ease forwards;
      margin-bottom:32px;
    }
    .form-card h2 {
      font-family:'Orbitron',sans-serif; font-size:18px;
      color:var(--accent); margin-bottom:24px;
    }

    .form-group { margin-bottom:18px; }
    .form-group label {
      display:block; font-size:12px; font-weight:800;
      color:var(--muted); letter-spacing:1px; text-transform:uppercase;
      margin-bottom:8px;
    }
    .form-group input,
    .form-group textarea {
      width:100%; padding:14px 18px;
      border:1px solid var(--glass-b); border-radius:14px;
      background:rgba(255,255,255,0.06); color:white;
      font-size:15px; font-family:'DM Sans',sans-serif;
      outline:none; transition:.25s; resize:none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color:rgba(56,189,248,0.5);
      background:rgba(56,189,248,0.06);
      box-shadow:0 0 0 3px rgba(56,189,248,0.1);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color:#475569; }
    .form-group textarea { height:110px; }

    .send-btn {
      width:100%; padding:15px;
      border:none; border-radius:14px; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-weight:800; font-size:15px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white; box-shadow:0 12px 32px rgba(37,99,235,0.4);
      transition:.3s; position:relative; overflow:hidden;
    }
    .send-btn::after {
      content:''; position:absolute; inset:0;
      background:rgba(255,255,255,0.12); opacity:0; transition:.2s;
    }
    .send-btn:hover::after { opacity:1; }
    .send-btn:hover { transform:translateY(-3px); box-shadow:0 18px 40px rgba(37,99,235,0.5); }
    .send-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* success toast */
    #toast {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
      background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4);
      backdrop-filter:blur(16px); color:#86efac;
      padding:14px 28px; border-radius:999px;
      font-weight:800; font-size:14px;
      z-index:5000; transition:.4s cubic-bezier(.16,1,.3,1);
      pointer-events:none;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }

    /* ── COMMENTS SECTION ── */
    .comments-card {
      background:var(--glass); border:1px solid var(--glass-b);
      backdrop-filter:blur(20px); border-radius:28px;
      padding:38px 36px;
      box-shadow:0 30px 80px rgba(0,0,0,0.4);
      opacity:0; animation:fadeUp .8s .4s ease forwards;
    }
    .comments-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:28px;
    }
    .comments-header h2 {
      font-family:'Orbitron',sans-serif; font-size:18px; color:var(--accent);
    }
    .comment-count {
      padding:4px 12px; border-radius:999px;
      background:rgba(56,189,248,0.12); border:1px solid rgba(56,189,248,0.25);
      color:#7dd3fc; font-size:12px; font-weight:800;
    }

    .comment-item {
      padding:20px; margin-bottom:14px; border-radius:18px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      transition:.25s; animation:fadeIn .4s ease;
    }
    .comment-item:hover { border-color:rgba(56,189,248,0.2); background:rgba(56,189,248,0.04); }
    .comment-item:last-child { margin-bottom:0; }

    .comment-top {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .comment-name {
      font-weight:800; font-size:15px; color:var(--accent);
      display:flex; align-items:center; gap:8px;
    }
    .comment-avatar {
      width:32px; height:32px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:900; color:white; flex-shrink:0;
    }
    .comment-time { font-size:11px; color:var(--muted); }
    .comment-text { color:#dbeafe; line-height:1.7; font-size:14px; margin-bottom:12px; }
    .comment-actions { display:flex; gap:8px; }

    .like-btn, .delete-btn {
      border:1px solid var(--glass-b); background:var(--glass);
      border-radius:999px; padding:6px 14px;
      font-size:12px; font-weight:800; cursor:pointer;
      color:white; transition:.2s; font-family:'DM Sans',sans-serif;
    }
    .like-btn:hover { border-color:rgba(56,189,248,0.4); background:rgba(56,189,248,0.1); color:var(--accent); }
    .delete-btn { color:#fca5a5; }
    .delete-btn:hover { border-color:rgba(239,68,68,0.4); background:rgba(239,68,68,0.08); }

    .no-comments {
      text-align:center; color:var(--muted);
      font-size:15px; padding:32px 0;
    }
    .no-comments span { font-size:32px; display:block; margin-bottom:10px; }

    /* loading spinner */
    .spinner {
      width:32px; height:32px; border-radius:50%;
      border:3px solid var(--glass-b);
      border-top-color:var(--accent);
      animation:spin .8s linear infinite;
      margin:32px auto;
    }

    /* back link */
    .back-link {
      display:inline-flex; align-items:center; gap:8px;
      margin-top:32px; color:#93c5fd;
      text-decoration:none; font-weight:800; font-size:14px;
      transition:.2s; opacity:0; animation:fadeUp .8s .55s ease forwards;
    }
    .back-link:hover { color:var(--accent); gap:12px; }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin   { from{transform:rotate(0);}to{transform:rotate(360deg);} }
    @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.7);} }
    @keyframes meteor {
      0%  {transform:translateX(0) translateY(0);opacity:1;}
      100%{transform:translateX(-600px) translateY(300px);opacity:0;}
    }

    .meteor {
      position:fixed; border-radius:999px;
      background:linear-gradient(90deg,white,transparent);
      pointer-events:none; z-index:0; opacity:0;
      animation:meteor linear forwards;
    }

    /* ── RESPONSIVE ── */
    @media (max-width:760px) {
      body { cursor:auto; }
      #cursor, #cursor-ring { display:none; }
      header { padding:16px 20px; }
      nav { display:none; }
      .hamburger { display:flex; }
      .page { padding:100px 16px 60px; }
      .page-title { font-size:36px; }
      .form-card, .comments-card { padding:26px 20px; }
    }
  </style>
</head>

<!-- TRANSLATIONS -->
<script>
const T = {
  en: {
    nav_home:"Home", nav_projects:"Projects", nav_contact:"Contact",
    page_tag:"Get In Touch", page_title:"Contact Me",
    page_sub:"Have a question or want to collaborate? Drop a message below.",
    form_title:"Leave a Comment",
    label_name:"Your Name", label_msg:"Message",
    placeholder_name:"Your name", placeholder_msg:"Write your comment...",
    btn_send:"Send Comment",
    comments_title:"Comments", btn_back:"Back Home",
    toast_sent:"✅ Comment sent!",
    alert_empty:"Please write your name and comment.",
    prompt_pass:"Enter admin password:", alert_wrong:"Wrong password.",
    confirm_delete:"Delete this comment?",
    no_comments:"No comments yet. Be the first!",
    loading:"Loading…",
  },
  zh: {
    nav_home:"首页", nav_projects:"项目", nav_contact:"联系",
    page_tag:"联系我", page_title:"联系我",
    page_sub:"有问题或想合作？在下方留言吧。",
    form_title:"留言评论",
    label_name:"你的名字", label_msg:"留言",
    placeholder_name:"你的名字", placeholder_msg:"写下你的留言…",
    btn_send:"发送留言",
    comments_title:"留言区", btn_back:"返回首页",
    toast_sent:"✅ 留言已发送！",
    alert_empty:"请填写名字和留言。",
    prompt_pass:"请输入管理员密码：", alert_wrong:"密码错误。",
    confirm_delete:"确定删除这条留言？",
    no_comments:"还没有留言，快来第一个！",
    loading:"加载中…",
  },
  kz: {
    nav_home:"Басты бет", nav_projects:"Жобалар", nav_contact:"Байланыс",
    page_tag:"Хабарласыңыз", page_title:"Маған хабарласыңыз",
    page_sub:"Сұрақ бар ма немесе бірге жұмыс жасағыңыз келе ме? Төменде хабарлама жіберіңіз.",
    form_title:"Пікір қалдыру",
    label_name:"Атыңыз", label_msg:"Хабарлама",
    placeholder_name:"Атыңыз", placeholder_msg:"Пікіріңізді жазыңыз…",
    btn_send:"Пікір жіберу",
    comments_title:"Пікірлер", btn_back:"Басты бетке",
    toast_sent:"✅ Пікір жіберілді!",
    alert_empty:"Атыңызды және пікіріңізді жазыңыз.",
    prompt_pass:"Әкімші құпия сөзін енгізіңіз:", alert_wrong:"Қате құпия сөз.",
    confirm_delete:"Бұл пікірді жою керек пе?",
    no_comments:"Әлі пікір жоқ. Бірінші болыңыз!",
    loading:"Жүктелуде…",
  }
};

let lang = localStorage.getItem("lang") || "en";

function t(key) { return (T[lang] && T[lang][key]) || key; }

function applyLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (T[l][k] !== undefined) el.innerHTML = T[l][k];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const k = el.getAttribute("data-i18n-placeholder");
    if (T[l][k] !== undefined) el.placeholder = T[l][k];
  });
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === l));
  document.documentElement.lang = l === "kz" ? "kk" : l;
}

document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => applyLang(b.dataset.lang)));
applyLang(lang);
</script>

<!-- INTERACTIONS -->
<script>
/* cursor */
const cur = document.getElementById("cursor");
const curRing = document.getElementById("cursor-ring");
const glow = document.getElementById("mouse-glow");
document.addEventListener("mousemove", e => {
  cur.style.left = e.clientX + "px"; cur.style.top = e.clientY + "px";
  curRing.style.left = e.clientX + "px"; curRing.style.top = e.clientY + "px";
  glow.style.left = e.clientX + "px"; glow.style.top = e.clientY + "px";
});

/* star canvas with parallax */
(function(){
  const canvas = document.getElementById("star-canvas");
  const ctx = canvas.getContext("2d");
  let W, H, stars = [], scrollY = 0;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function initStars(){
    stars = [];
    for(let i=0;i<200;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+0.2, phase:Math.random()*Math.PI*2,
      speed:Math.random()*0.004+0.001, parallax:Math.random()*0.12
    });
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H); t+=0.012;
    stars.forEach(s=>{
      const a = 0.35+0.65*Math.abs(Math.sin(t*s.speed*80+s.phase));
      const py = s.y - scrollY*s.parallax;
      ctx.beginPath(); ctx.arc(s.x,py,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize",()=>{resize();initStars();});
  window.addEventListener("scroll",()=>{ scrollY=window.scrollY; });
  resize(); initStars(); draw();
})();

/* meteors */
function spawnMeteor(){
  const m = document.createElement("div");
  m.className = "meteor";
  const w = Math.random()*120+60, h = Math.random()*1.5+1;
  const dur = Math.random()*1.2+0.8;
  m.style.cssText=`left:${Math.random()*window.innerWidth}px;top:${Math.random()*window.innerHeight*0.5}px;width:${w}px;height:${h}px;animation-duration:${dur}s;transform:rotate(${-35+Math.random()*10}deg);`;
  document.body.appendChild(m);
  setTimeout(()=>m.remove(),(dur+0.2)*1000);
}
setInterval(spawnMeteor,2800);
setTimeout(()=>setInterval(spawnMeteor,2800),1400);

/* progress bar */
const bar = document.getElementById("progress-bar");
window.addEventListener("scroll",()=>{
  bar.style.width=(window.scrollY/(document.body.scrollHeight-window.innerHeight)*100)+"%";
});

/* hamburger */
const hamburger = document.getElementById("hamburger");
const mobileNav = document.getElementById("mobile-nav");
const mobileOverlay = document.getElementById("mobile-overlay");
function toggleMenu(open){
  hamburger.classList.toggle("open",open);
  mobileNav.classList.toggle("open",open);
  mobileOverlay.classList.toggle("open",open);
  document.body.style.overflow = open ? "hidden" : "";
}
hamburger.addEventListener("click",()=>toggleMenu(!mobileNav.classList.contains("open")));
mobileOverlay.addEventListener("click",()=>toggleMenu(false));
document.querySelectorAll(".mobile-nav a").forEach(a=>a.addEventListener("click",()=>toggleMenu(false)));

/* toast */
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),3000);
}

/* time ago */
function timeAgo(date){
  const diff = (Date.now()-date.getTime())/1000;
  if(diff<60) return "just now";
  if(diff<3600) return Math.floor(diff/60)+"m ago";
  if(diff<86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

/* avatar initials */
function initials(name){
  return (name||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
}
</script>

<script type="module">

  getFirestore, collection, addDoc, onSnapshot,
  doc, updateDoc, deleteDoc, increment, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  projectId: "qainar-website",

};

const app = initializeApp(cfg);
const db  = getFirestore(app);

/* ── Real-time comments ── */
const commentsBox = document.getElementById("comments");
const countEl = document.getElementById("comment-count");

const q = query(collection(db,"comments"), orderBy("time","desc"));

onSnapshot(q, snap => {
  countEl.textContent = snap.size;
  commentsBox.innerHTML = "";

  if(snap.empty){
    commentsBox.innerHTML = `<div class="no-comments"><span>💬</span>${window.t ? window.t("no_comments") : "No comments yet."}</div>`;
    return;
  }

  snap.forEach(item => {
    const d = item.data();
    const ago = d.time ? timeAgo(new Date(d.time.seconds*1000)) : "";
    const div = document.createElement("div");
    div.className = "comment-item";
    div.innerHTML = `
      <div class="comment-top">
        <div class="comment-name">
          <div class="comment-avatar">${initials(d.name)}</div>
          ${d.name || "Anonymous"}
        </div>
        <span class="comment-time">${ago}</span>
      </div>
      <div class="comment-text">${d.message || ""}</div>
      <div class="comment-actions">
        <button class="like-btn" data-id="${item.id}">👍 ${d.likes||0}</button>
        <button class="delete-btn" data-id="${item.id}">🗑 Delete</button>
      </div>
    `;
    commentsBox.appendChild(div);
  });

 /* like */
  commentsBox.querySelectorAll(".like-btn").forEach(btn => {
    const id = btn.dataset.id;
    const liked = localStorage.getItem("liked_"+id);
    if(liked){ btn.style.opacity="0.4"; btn.style.cursor="not-allowed"; }
    btn.addEventListener("click", async () => {
      if(localStorage.getItem("liked_"+id)) return;
      localStorage.setItem("liked_"+id, "1");
      btn.style.opacity="0.4"; btn.style.cursor="not-allowed";
      await updateDoc(doc(db,"comments",id), { likes: increment(1) });
    });
  });

  /* delete */
  commentsBox.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const lang = localStorage.getItem("lang")||"en";
      const tr = window.T && window.T[lang];
      const pass = prompt(tr ? tr.prompt_pass : "Enter admin password:");
      if(pass !== "05925"){ alert(tr ? tr.alert_wrong : "Wrong password."); return; }
      if(!confirm(tr ? tr.confirm_delete : "Delete this comment?")) return;
      await deleteDoc(doc(db,"comments",btn.dataset.id));
    });
  });
});

/* ── Send comment ── */
const sendBtn = document.getElementById("send-btn");
sendBtn.addEventListener("click", async () => {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const lang = localStorage.getItem("lang")||"en";
  const tr = window.T && window.T[lang];

  if(!name || !message){
    alert(tr ? tr.alert_empty : "Please write your name and comment."); return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = "⏳ Sending...";

  try {
    await addDoc(collection(db,"comments"), {
      name, message, likes:0, time: new Date()
    });
    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
    showToast(tr ? tr.toast_sent : "✅ Comment sent!");
  } catch(e) {
    alert("Error sending. Try again.");
    console.error(e);
  }

  sendBtn.disabled = false;
  const sendKey = tr ? "btn_send" : null;
  sendBtn.textContent = sendKey && window.T[lang][sendKey] ? window.T[lang][sendKey] : "Send Comment";
});

/* expose helpers to global */
window.t = key => {
  const l = localStorage.getItem("lang")||"en";
  return (window.T && window.T[l] && window.T[l][key]) || key;
};
</script>
