<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Qainar</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #2563eb, #020617 60%);
      color: white;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(2, 6, 23, 0.75);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .contact {
      min-height: 100vh;
      padding: 150px 8% 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      max-width: 700px;
      width: 100%;
      padding: 45px;
      border-radius: 28px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    .box h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .box p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .info {
      display: grid;
      gap: 18px;
      margin-top: 25px;
    }

    .item {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .item:hover {
      transform: translateY(-5px);
      background: rgba(56,189,248,0.2);
    }

    .item a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 26px;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #38bdf8;
      transform: translateY(-4px);
    }

    @media (max-width: 700px) {
      .box h1 {
        font-size: 38px;
      }

      nav a {
        margin-left: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Qainar's Website</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="contact">
  <div class="box">
    <h1>Contact Me 📩</h1>
    <p>
      Feel free to contact me for study, engineering projects,
      collaboration, or future opportunities.
    </p>

    <div class="info">
      <div class="item">
        Email:
        <a href="mailto:kkay55925@gmail.com">kkay55925@gmail.com</a>
      </div>

      <div class="item">
        Location: Almaty, Kazakhstan
      </div>

      <div class="item">
        Field: Space Engineering & Technology
      </div>
    </div>

    <a href="index.html" class="btn">← Back Home</a>
  </div>
</section>

</body>
</html>
