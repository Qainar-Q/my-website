<!DOCTYPE html>
<html>
<head>
  <title>Qainar's Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 55px;
      background: rgba(15, 23, 42, 0.85);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 25px;
      font-weight: bold;
    }

    .hero {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 120px 60px;
      flex-wrap: wrap;
    }

    .hero h2 {
      font-size: 56px;
      margin: 0;
    }

    .blue {
      color: #38bdf8;
    }

    .hero p {
      font-size: 18px;
      color: #cbd5e1;
      max-width: 420px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 13px 25px;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    .profile-card {
      background: rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 45px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .avatar {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: #0ea5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 45px;
      margin: auto;
    }

    .floating-btn {
      position: fixed;
      right: 28px;
      bottom: 28px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: white;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      z-index: 20;
    }

    .chat-box {
      display: none;
      position: fixed;
      right: 28px;
      bottom: 105px;
      width: 330px;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      z-index: 20;
    }

    .chat-box h3 {
      margin-top: 0;
      text-align: center;
    }

    .chat-box input,
    .chat-box textarea {
      width: 92%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .chat-box textarea {
      height: 80px;
      resize: none;
    }

    .send-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 35px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

  <header>
    <h1>Qainar's Website</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Hi, I'm<br><span class="blue">Qainar</span> 🚀</h2>
      <p>Space Engineering student building future projects.</p>
      <a class="btn" href="projects.html">View Projects</a>
    </div>

    <div class="profile-card">
      <div class="avatar">🚀</div>
      <h2>Qainar</h2>
    </div>
  </section>

  <button class="floating-btn" onclick="toggleChat()">💬</button>

  <div class="chat-box" id="chatBox">
    <h3>Send a Message</h3>

    <input id="homeName" placeholder="Your name">
    <textarea id="homeMessage" placeholder="Write your message..."></textarea>

    <button class="send-btn" onclick="sendToContact()">Send to Contact</button>
  </div>

  <footer>
    © 2026 Qainar's Website
  </footer>

  <script>
    function toggleChat() {
      const box = document.getElementById("chatBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
    }

    function sendToContact() {
      const name = document.getElementById("homeName").value;
      const message = document.getElementById("homeMessage").value;

      if (name === "" || message === "") {
        alert("Please write your name and message.");
        return;
      }

      localStorage.setItem("newCommentName", name);
      localStorage.setItem("newCommentMessage", message);

      window.location.href = "contact.html";
    }
  </script>

</body>
</html>
