<!DOCTYPE html>
<html>
<head>
  <title>Qainar</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;

      background-image:
        linear-gradient(rgba(2,6,23,0.4), rgba(2,6,23,0.85)),
        url("galaxy.jpg");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      background: rgba(2,6,23,0.7);
      backdrop-filter: blur(10px);
    }

    nav a {
      color: #cbd5e1;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      text-align: center;
      padding: 150px 20px 100px;
    }

    .hero h1 {
      font-size: 70px;
      margin: 0;
    }

    .glow {
      color: #38bdf8;
      text-shadow: 0 0 25px #38bdf8;
    }

    .hero p {
      color: #94a3b8;
      font-size: 20px;
      margin-top: 20px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 30px;
      border-radius: 14px;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-5px) scale(1.05);
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 80px 20px;
      flex-wrap: wrap;
    }

    .card {
      width: 260px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .card h3 {
      color: #38bdf8;
    }

    /* floating button */
    .floating-btn {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      color: white;
      border: none;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    .chat-box {
      display: none;
      position: fixed;
      right: 30px;
      bottom: 110px;
      width: 320px;
      background: rgba(2,6,23,0.95);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    input, textarea {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .send-btn {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h2>Qainar</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Hi, I'm <span class="glow">Qainar</span></h1>
  <p>Space engineering · building real future systems</p>
  <a class="btn" href="projects.html">Explore Projects</a>
</section>

<section class="cards">
  <div class="card">
    <h3>🚀 Space</h3>
    <p>aerospace · cansat · satellites</p>
  </div>

  <div class="card">
    <h3>💻 Code</h3>
    <p>web · firebase · interaction</p>
  </div>

  <div class="card">
    <h3>📘 Study</h3>
    <p>physics · math · engineering</p>
  </div>
</section>

<button class="floating-btn" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBox">
  <h3>Send Message</h3>

  <input id="homeName" placeholder="Your name">
  <textarea id="homeMessage" placeholder="Message"></textarea>

  <button class="send-btn" onclick="sendToContact()">Send</button>
</div>

<footer>
  © 2026 Qainar
</footer>

<script>
function toggleChat() {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function sendToContact() {
  const name = document.getElementById("homeName").value;
  const message = document.getElementById("homeMessage").value;

  if (name === "" || message === "") {
    alert("Write something first");
    return;
  }

  localStorage.setItem("newCommentName", name);
  localStorage.setItem("newCommentMessage", message);

  window.location.href = "contact.html";
}
</script>

</body>
</html>
