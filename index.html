<!DOCTYPE html>
<html>
<head>
  <title>Qainar Learning Space</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.5);
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      color: #94a3b8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #3b82f6;
      border-radius: 8px;
      display: inline-block;
      text-decoration: none;
      color: white;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }
  </style>
</head>

<body>

<header>
  <h1>Qainar</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Build Your Future 🚀</h2>
  <p>Space Engineering | Study Logs | Projects</p>
  <a class="btn">Start Exploring</a>
</section>

<section class="cards">
  <div class="card">
    <h3>Physics</h3>
    <p>Mechanics & Electromagnetism</p>
  </div>

  <div class="card">
    <h3>SAT</h3>
    <p>Reading & Writing practice</p>
  </div>

  <div class="card">
    <h3>Projects</h3>
    <p>CanSat & Engineering work</p>
  </div>
</section>

</body>
</html>
