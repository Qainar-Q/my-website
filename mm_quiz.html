<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Тест — Емтихан дайындығы</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white: #ffffff;
  --off: #f7f8fc;
  --border: #e4e7ef;
  --text: #1a1d2e;
  --muted: #7b82a0;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --yellow: #d97706;
  --yellow-bg: #fffbeb;
  --radius: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--off);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

/* NAV */
nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-brand {
  font-weight: 600; font-size: 15px;
  display: flex; align-items: center; gap: 8px; color: var(--text);
  text-decoration: none;
}
.nav-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
.nav-right { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* MAIN */
.main { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }

/* SCREEN SYSTEM */
.screen { display: none; }
.screen.active { display: block; }

/* ── HOME ── */
.hero { margin-bottom: 36px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-light); color: var(--accent);
  font-size: 12px; font-weight: 500; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 16px;
}
.hero h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; line-height: 1.2; }
.hero h1 span { color: var(--accent); }
.hero p { color: var(--muted); font-size: 15px; }

.filter-row {
  display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
}
.chip {
  padding: 6px 16px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  border-radius: 20px; cursor: pointer;
  transition: all 0.15s;
}
.chip:hover, .chip.on {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

.topic-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.topic-row {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.topic-row:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.tl-left { display: flex; align-items: center; gap: 14px; }
.tl-num {
  width: 36px; height: 36px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 500;
  flex-shrink: 0;
}
.tl-title { font-size: 14px; font-weight: 500; }
.tl-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.tl-right { display: flex; align-items: center; gap: 12px; }
.tl-count { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
.btn-go {
  background: var(--accent);
  color: white;
  border: none;
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
  white-space: nowrap;
}
.btn-go:hover { opacity: 0.85; }

.all-row {
  background: var(--accent);
  color: white;
  border-radius: var(--radius);
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: opacity 0.15s;
}
.all-row:hover { opacity: 0.9; }
.all-row h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.all-row p { font-size: 13px; opacity: 0.8; }
.all-row .arr { font-size: 20px; }

/* ── QUIZ ── */
.quiz-header {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px;
}
.qh-info { flex: 1; }
.qh-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.qh-title { font-size: 14px; font-weight: 600; color: var(--text); }
.qh-scores { display: flex; gap: 16px; align-items: center; }
.score-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}
.score-pill.ok { background: var(--green-bg); color: var(--green); }
.score-pill.bad { background: var(--red-bg); color: var(--red); }
.prog {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}
.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.btn-exit {
  background: none; border: 1.5px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 500;
  padding: 7px 14px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.btn-exit:hover { border-color: var(--red); color: var(--red); }

.q-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  margin-bottom: 16px;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.q-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 14px;
}
.q-num-badge {
  background: var(--accent);
  color: white;
  width: 22px; height: 22px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}
.q-text { font-size: 16px; font-weight: 500; line-height: 1.6; color: var(--text); margin-bottom: 18px; }
.q-hint {
  background: var(--accent-light);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--accent);
}

.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.opt {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--text);
  transition: all 0.12s;
  text-align: left;
  width: 100%;
}
.opt:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--accent-light);
}
.opt-lbl {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--off);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
  transition: all 0.12s;
}
.opt-txt { flex: 1; line-height: 1.5; }
.opt.correct {
  border-color: var(--green);
  background: var(--green-bg);
}
.opt.correct .opt-lbl { background: var(--green); color: white; }
.opt.wrong {
  border-color: var(--red);
  background: var(--red-bg);
}
.opt.wrong .opt-lbl { background: var(--red); color: white; }
.opt:disabled { cursor: default; }

.exp-box {
  display: none;
  background: var(--yellow-bg);
  border: 1.5px solid #fde68a;
  border-radius: var(--radius);
  padding: 16px 18px;
  font-size: 14px; line-height: 1.65; color: #78350f;
  margin-bottom: 16px;
  animation: fadeIn 0.2s ease;
}
.exp-box.show { display: block; }
.exp-box strong { color: var(--yellow); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.btn-next {
  display: none;
  background: var(--accent); color: white;
  border: none; padding: 12px 28px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-next.show { display: inline-flex; align-items: center; gap: 8px; }
.btn-next:hover { opacity: 0.85; }

/* ── RESULT ── */
.result-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 48px 32px;
  text-align: center;
  animation: slideIn 0.3s ease;
}
.res-emoji { font-size: 48px; margin-bottom: 16px; }
.res-pct {
  font-size: 64px; font-weight: 700;
  letter-spacing: -2px; line-height: 1;
  margin-bottom: 6px;
}
.res-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; }
.res-row {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: 32px; flex-wrap: wrap;
}
.res-chip {
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
}
.res-chip.g { background: var(--green-bg); color: var(--green); }
.res-chip.r { background: var(--red-bg); color: var(--red); }
.res-chip.b { background: var(--accent-light); color: var(--accent); }
.res-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn-outline {
  background: white;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 10px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="#">
    <div class="nav-dot"></div>
    ММ Тест
  </a>
  <div class="nav-right" id="navInfo">Емтихан дайындығы</div>
</nav>

<div class="main">

  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <div class="hero">
      <div class="hero-tag">🎓 ҚазҰУ · МехМат</div>
      <h1>Материалдар<br><span>Механикасы</span></h1>
      <p>Тақырып бойынша жаттықтыр немесе аралас тест тапсыр</p>
    </div>

    <div class="filter-row">
      <button class="chip on" onclick="setFilter('all',this)">Барлығы</button>
      <button class="chip" onclick="setFilter('theory',this)">Теория</button>
    </div>

    <div class="topic-list" id="topicList"></div>

    <div class="all-row" onclick="begin(null)">
      <div>
        <h3>Барлық сұрақтар — Аралас тест</h3>
        <p id="allSubtitle">20 тақырып · кездейсоқ ретпен</p>
      </div>
      <div class="arr">→</div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" class="screen">
    <div class="quiz-header">
      <div class="qh-info">
        <div class="qh-label" id="qhLabel">Тест</div>
        <div class="qh-title" id="qhTitle">—</div>
        <div class="prog"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <div class="qh-scores">
        <div class="score-pill ok">✓ <span id="sOk">0</span></div>
        <div class="score-pill bad">✗ <span id="sBad">0</span></div>
      </div>
      <button class="btn-exit" onclick="goHome()">Шығу</button>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-badge">
        <div class="q-num-badge" id="qNumBadge">1</div>
        <span id="qTopic">—</span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-hint" id="qHint" style="display:none"></div>
    </div>

    <div class="options" id="optsWrap"></div>
    <div class="exp-box" id="expBox"></div>
    <button class="btn-next" id="btnNext" onclick="next()">Келесі →</button>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="screen">
    <div class="result-card">
      <div class="res-emoji" id="resEmoji">🎯</div>
      <div class="res-pct" id="resPct">—</div>
      <div class="res-sub" id="resSub">—</div>
      <div class="res-row" id="resRow"></div>
      <div class="res-btns">
        <button class="btn-outline" onclick="retryWrong()">✗ Қателерді қайта жаса</button>
        <button class="btn-outline" onclick="goHome()">↺ Басты бет</button>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// QUESTION BANK — 20 topics, 3-4 Qs each
// ans = 0-indexed correct option
// ══════════════════════════════════════════
const TOPICS = [
  {
    id: 1,
    title: 'Ішкі күш факторлары',
    cat: 'theory',
    qs: [
      {
        q: 'Сырықтағы ішкі күш факторлары нешеу және олар қандай?',
        opts: [
          'Екеу: N және Q',
          'Төртеу: N, Q, M, Мб',
          'Алтау: N, Qx, Qy, Mx, My, Mz',
          'Бесеу: N, Qx, Qy, M, Мб',
        ],
        ans: 2,
        exp: '<strong>Алты ішкі күш факторы:</strong> N — бойлық күш (созылу/сығылу), Qx, Qy — көлденең күштер (ығысу), Mx, My — июші моменттер, Mz (Мб) — бұраушы момент.',
        formula: 'N · Qx · Qy · Mx · My · Mz'
      },
      {
        q: 'Қию әдісінде сырықты ойша кесіп, бір бөлікке мыналарды жазамыз:',
        opts: [
          '∑Fx = 0 ғана жеткілікті',
          '∑F = 0 және ∑M = 0 — үш-үш теңдеу, барлығы 6',
          'Тек ∑M = 0 теңдеулері',
          'Тік кернеу теңдеуі σ = N/A',
        ],
        ans: 1,
        exp: '<strong>Қию әдісінде</strong> бір бөлік үшін 6 тепе-теңдік теңдеуі жазылады: ∑Fx=0, ∑Fy=0, ∑Fz=0 (үш күш теңдеуі) және ∑Mx=0, ∑My=0, ∑Mz=0 (үш момент теңдеуі). Осылардан N, Qx, Qy, Mx, My, Mz табылады.',
        formula: '∑Fx=0, ∑Fy=0, ∑Fz=0, ∑Mx=0, ∑My=0, ∑Mz=0'
      },
      {
        q: 'N > 0 болса сырық қандай жүктеме астында, N < 0 болса ше?',
        opts: [
          'N > 0 — сығылу, N < 0 — созылу',
          'N > 0 — июші момент, N < 0 — бұраушы момент',
          'N > 0 — созылу, N < 0 — сығылу',
          'Таңба мәнсіз, тек шама маңызды',
        ],
        ans: 2,
        exp: '<strong>Таңба ережесі:</strong> N > 0 болса — сырық созылып тұр (созушы күш), N < 0 болса — сырық сығылып тұр (сығушы күш).',
        formula: 'N > 0 → созылу | N < 0 → сығылу'
      },
      {
        q: 'Ішкі күш факторлары мен сыртқы күштердің айырмашылығы?',
        opts: [
          'Ешқандай айырмашылық жоқ, олар бірдей',
          'Ішкі күштер — сырық ішіндегі бөліктердің бір-біріне тигізетін әсері; сыртқы — қолданылатын жүктемелер мен реакциялар',
          'Сыртқы күштер қимада пайда болады, ішкі — тіректерде',
          'Ішкі күштер тек металл сырықтарда болады',
        ],
        ans: 1,
        exp: '<strong>Ішкі күш факторлары</strong> — сыртқы жүктеменің әсерінен сырықтың кез-келген қимасында пайда болатын, бір бөліктің екінші бөлікке тигізетін күштер мен моменттер. Оларды сыртқы жүктемелерден ажырату маңызды.',
        formula: 'Ішкі ↔ сырық ішіндегі әсерлесу'
      },
    ]
  },
  {
    id: 2,
    title: 'Кернеу мен деформация',
    cat: 'theory',
    qs: [
      {
        q: 'Созылу кезіндегі тік кернеу формуласы және оның бірлігі?',
        opts: [
          'σ = M/Wx, бірлігі Н·м',
          'σ = N/A, бірлігі Па (немесе МПа)',
          'σ = Q/A, бірлігі Н',
          'σ = E·l, бірлігі м',
        ],
        ans: 1,
        exp: '<strong>Тік кернеу:</strong> σ = N/A, мұнда N — бойлық күш (Н), A — қима ауданы (м²). Бірлігі: Па = Н/м². Тәжірибеде МПа (мегапаскаль) қолданылады: 1 МПа = 10⁶ Па.',
        formula: 'σ = N/A  [Па = Н/м²]'
      },
      {
        q: 'Гук заңы серпімді аймақта кернеу мен деформацияны қалай байланыстырады?',
        opts: [
          'σ = E/ε',
          'σ = ε/E',
          'σ = E·ε',
          'E = σ + ε',
        ],
        ans: 2,
        exp: '<strong>Гук заңы:</strong> σ = E·ε. Мұнда E — серпімділік модулі (материалдың қаттылығын сипаттайды). E неғұрлым үлкен болса, материал аз деформацияланады. Болатта E ≈ 2×10⁵ МПа.',
        formula: 'σ = E · ε  →  E = σ/ε'
      },
      {
        q: 'Абсолюттік ұзару Δl және салыстырмалы деформация ε — олардың байланысы?',
        opts: [
          'Δl = ε/l₀ және ε = l₀/Δl',
          'ε = Δl · l₀',
          'Δl = l₁ − l₀ және ε = Δl/l₀',
          'ε = l₀ − l₁ және Δl = l₀·ε',
        ],
        ans: 2,
        exp: '<strong>Деформация анықтамасы:</strong> Δl = l₁ − l₀ — абсолюттік өзгеріс (м), ε = Δl/l₀ — салыстырмалы (өлшемсіз). Созылуда ε > 0, сығылуда ε < 0.',
        formula: 'ε = Δl/l₀ = (l₁ − l₀)/l₀'
      },
      {
        q: 'Серпімді және пластикалық деформациялардың айырмашылығы?',
        opts: [
          'Серпімді — күш алынғанда қалдық қалады; пластикалық — бастапқы қалпына келеді',
          'Серпімді — бастапқы қалпына келеді; пластикалық — күш алынғаннан кейін қалдық деформация қалады',
          'Олардың айырмашылығы жоқ',
          'Серпімді тек сығылуда, пластикалық тек созылуда болады',

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let pool = [], cur = 0, sc = {ok:0, bad:0}, answered = false, wrongs = [];
let filterCat = 'all', quizTitle = '';

// ══════════════════════════════════════════
// HOME
// ══════════════════════════════════════════
function setFilter(cat, btn) {
  filterCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  const src = filterCat === 'all' ? TOPICS : TOPICS.filter(t => t.cat === filterCat);
  document.getElementById('allSubtitle').textContent = src.length + ' тақырып · кездейсоқ ретпен';
  document.getElementById('topicList').innerHTML = src.map(t => `
    <div class="topic-row">
      <div class="tl-left">
        <div class="tl-num">${t.id}</div>
        <div>
          <div class="tl-title">${t.title}</div>
          <div class="tl-sub">${t.qs.length} сұрақ</div>
        </div>
      </div>
      <div class="tl-right">
        <div class="tl-count">${t.qs.length} Q</div>
        <button class="btn-go" onclick="begin('${t.title.replace(/'/g,"\\'")}')">▶ Бастау</button>
      </div>
    </div>
  `).join('');
}

function begin(topicTitle) {
  let src;
  if (!topicTitle) {
    const pool_src = filterCat === 'all' ? TOPICS : TOPICS.filter(t => t.cat === filterCat);
    src = pool_src.flatMap(t => t.qs.map(q => ({...q, topic: t.title, topicId: t.id})));
    quizTitle = 'Аралас тест';
  } else {
    const topic = TOPICS.find(t => t.title === topicTitle);
    src = topic.qs.map(q => ({...q, topic: topic.title, topicId: topic.id}));
    quizTitle = topicTitle;
  }
  pool = shuffle([...src]);
  sc = {ok:0, bad:0}; cur = 0; wrongs = [];
  show('quizScreen');
  loadQ();
}

function goHome() { show('homeScreen'); }

// ══════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════
function loadQ() {
  answered = false;
  const q = pool[cur], total = pool.length;

  document.getElementById('navInfo').textContent = `${cur+1} / ${total}`;
  document.getElementById('qhLabel').textContent = quizTitle;
  document.getElementById('qhTitle').textContent = q.topic || quizTitle;
  document.getElementById('progFill').style.width = `${(cur/total)*100}%`;
  document.getElementById('sOk').textContent = sc.ok;
  document.getElementById('sBad').textContent = sc.bad;
  document.getElementById('qNumBadge').textContent = cur + 1;
  document.getElementById('qTopic').textContent = q.topic;
  document.getElementById('qText').textContent = q.q;

  const hi = document.getElementById('qHint');
  if (q.formula) { hi.textContent = q.formula; hi.style.display='block'; }
  else hi.style.display='none';

  const keys = ['A','B','C','D','E'];
  document.getElementById('optsWrap').innerHTML = q.opts.map((o,i) => `
    <button class="opt" id="o${i}" onclick="pick(${i})">
      <span class="opt-lbl">${keys[i]}</span>
      <span class="opt-txt">${o}</span>
    </button>
  `).join('');

  document.getElementById('expBox').className = 'exp-box';
  document.getElementById('btnNext').className = 'btn-next';

  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = pool[cur];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  document.getElementById('o'+q.ans).classList.add('correct');
  if (i !== q.ans) {
    document.getElementById('o'+i).classList.add('wrong');
    sc.bad++; wrongs.push(q);
  } else {
    sc.ok++;
  }
  document.getElementById('sOk').textContent = sc.ok;
  document.getElementById('sBad').textContent = sc.bad;
  const eb = document.getElementById('expBox');
  eb.innerHTML = q.exp; eb.className = 'exp-box show';
  document.getElementById('btnNext').className = 'btn-next show';
}

function next() {
  cur++;
  if (cur >= pool.length) showResult();
  else loadQ();
}

// ══════════════════════════════════════════
// RESULT
// ══════════════════════════════════════════
function showResult() {
  show('resultScreen');
  const pct = Math.round((sc.ok / pool.length) * 100);
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '💪' : pct >= 40 ? '📚' : '😅';
  const sub = pct >= 80 ? 'Тамаша! Емтиханға дайынсыз.' : pct >= 60 ? 'Жақсы! Аз жетіспейді.' : 'Жалғастырыңыз, болады!';
  document.getElementById('resEmoji').textContent = emoji;
  const el = document.getElementById('resPct');
  el.textContent = pct + '%';
  el.style.color = pct >= 70 ? '#16a34a' : pct >= 50 ? '#d97706' : '#dc2626';
  document.getElementById('resSub').textContent = sub;
  document.getElementById('resRow').innerHTML = `
    <div class="res-chip g">✓ Дұрыс: ${sc.ok}</div>
    <div class="res-chip r">✗ Қате: ${sc.bad}</div>
    <div class="res-chip b">Барлығы: ${pool.length}</div>
  `;
  document.getElementById('navInfo').textContent = 'Нәтиже';
}

function retryWrong() {
  if (!wrongs.length) { goHome(); return; }
  pool = shuffle([...wrongs]);
  sc = {ok:0,bad:0}; cur = 0; wrongs = [];
  quizTitle = 'Қателерді қайталау';
  show('quizScreen'); loadQ();
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// INIT
renderList();
</script>
