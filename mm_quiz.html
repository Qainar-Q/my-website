<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ММ Тест · Емтихан дайындығы</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#38bdf8;--accent2:#2563eb;--gold:#fbbf24;
  --glass:rgba(255,255,255,0.07);--glass-b:rgba(255,255,255,0.14);
  --muted:#94a3b8;--r:20px;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  min-height:100vh;font-family:'DM Sans',sans-serif;
  color:white;background:#020817;overflow-x:hidden;
}
#star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#mouse-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .15s,top .15s;}

/* NAV */
header{
  position:fixed;top:0;width:100%;padding:16px 48px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:1000;background:rgba(2,8,23,0.92);
  backdrop-filter:blur(24px);border-bottom:1px solid var(--glass-b);
}
.logo{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(135deg,#fff 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;cursor:pointer;
}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{
  color:white;text-decoration:none;font-weight:700;font-size:13px;
  opacity:0.75;transition:.25s;letter-spacing:0.3px;position:relative;
}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:2px;background:var(--accent);transition:width .25s;}
.nav-links a:hover{opacity:1;color:var(--accent);}
.nav-links a:hover::after{width:100%;}
.nav-back{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--glass-b);
  color:var(--muted);font-size:13px;font-weight:700;
  padding:8px 16px;border-radius:10px;text-decoration:none;
  transition:.2s;backdrop-filter:blur(10px);
}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}

/* SCREENS */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ── HOME ── */
.home-wrap{max-width:900px;margin:0 auto;padding:120px 24px 80px;}
.home-hero{text-align:center;margin-bottom:64px;}
.home-tag{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 18px;margin-bottom:24px;border-radius:999px;
  background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.35);
  color:#7dd3fc;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;
}
.home-tag-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
.home-hero h1{
  font-family:'Orbitron',sans-serif;font-size:clamp(28px,5vw,52px);
  font-weight:900;line-height:1.1;margin-bottom:16px;letter-spacing:1px;
}
.home-hero h1 span{
  color:var(--accent);text-shadow:0 0 40px rgba(56,189,248,0.5);
}
.home-hero p{color:#c5d8f0;font-size:17px;max-width:520px;margin:0 auto;}

/* MODE PILLS */
.mode-row{display:flex;gap:10px;justify-content:center;margin-bottom:40px;flex-wrap:wrap;}
.mode-pill{
  padding:8px 20px;border-radius:999px;
  border:1.5px solid var(--glass-b);background:var(--glass);
  color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
  backdrop-filter:blur(10px);
}
.mode-pill:hover,.mode-pill.on{
  border-color:var(--accent);color:var(--accent);
  background:rgba(56,189,248,0.1);
}

/* TOPIC GRID */
.topic-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:14px;margin-bottom:32px;
}
.topic-card{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:20px 22px;
  display:flex;flex-direction:column;gap:10px;
  transition:.3s;backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.topic-card:hover{border-color:rgba(56,189,248,0.45);transform:translateY(-4px);}
.tc-head{display:flex;justify-content:space-between;align-items:center;}
.tc-num{
  font-family:'Orbitron',sans-serif;font-size:22px;
  font-weight:900;color:var(--accent);
  text-shadow:0 0 20px rgba(56,189,248,0.4);
}
.tc-badge{
  padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;
  background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.25);color:#7dd3fc;
}
.tc-title{font-size:14px;font-weight:700;color:white;}
.tc-sub{font-size:12px;color:var(--muted);}
.tc-btn{
  margin-top:4px;align-self:flex-start;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:white;padding:8px 18px;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(37,99,235,0.35);
}
.tc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.5);}

/* ALL BUTTON */
.all-btn-wrap{text-align:center;margin-top:8px;}
.all-btn{
  padding:14px 40px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:white;font-family:'Orbitron',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:.3s;
  box-shadow:0 12px 32px rgba(37,99,235,0.4);
}
.all-btn:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(37,99,235,0.55);}
.all-hint{color:var(--muted);font-size:13px;margin-top:12px;}

/* ── QUIZ ── */
.quiz-wrap{max-width:760px;margin:0 auto;padding:100px 20px 80px;}
.quiz-topbar{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:16px 24px;
  display:flex;align-items:center;gap:16px;
  margin-bottom:28px;backdrop-filter:blur(14px);flex-wrap:wrap;
}
.qbar-info{flex:1;}
.qbar-label{font-size:10px;color:var(--muted);font-family:'Orbitron',sans-serif;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.qbar-title{font-size:14px;font-weight:700;}
.qbar-prog{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:8px;}
.qbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}
.qbar-scores{display:flex;gap:12px;}
.qscore{display:flex;flex-direction:column;align-items:center;}
.qscore-lbl{font-size:10px;color:var(--muted);font-family:'Orbitron',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.qscore-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;}
.qscore-val.ok{color:var(--green);}
.qscore-val.bad{color:var(--red);}
.exit-btn{
  background:var(--glass);border:1px solid var(--glass-b);color:var(--muted);
  font-size:12px;font-weight:700;padding:7px 14px;border-radius:10px;
  cursor:pointer;transition:.2s;white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.exit-btn:hover{border-color:var(--red);color:var(--red);}

/* QUESTION CARD */
.q-card{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:var(--r);padding:30px 32px 26px;
  margin-bottom:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);backdrop-filter:blur(16px);
  position:relative;overflow:hidden;
  animation:fadeUp .28s ease;
}
.q-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(56,189,248,0.05) 0%,transparent 60%);
  pointer-events:none;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
.q-meta{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.q-num{
  font-family:'Orbitron',sans-serif;font-size:11px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;padding:4px 12px;border-radius:999px;font-weight:700;
  letter-spacing:1px;white-space:nowrap;
}
.q-topic{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
.q-text{font-size:16px;font-weight:600;line-height:1.65;color:#e2e8f0;margin-bottom:18px;}
.q-formula{
  background:rgba(56,189,248,0.06);border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0;padding:10px 16px;
  font-family:'Orbitron',sans-serif;font-size:11px;color:#7dd3fc;
  letter-spacing:0.5px;
}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opt{
  background:rgba(255,255,255,0.04);
  border:1.5px solid var(--glass-b);border-radius:14px;
  padding:14px 18px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;color:#e2e8f0;
  display:flex;align-items:flex-start;gap:14px;
  transition:.15s;text-align:left;width:100%;
  position:relative;overflow:hidden;
}
.opt::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(56,189,248,0.06) 0%,transparent 50%);
  opacity:0;transition:.2s;
}
.opt:hover:not(:disabled){
  border-color:rgba(56,189,248,0.55);
  background:rgba(56,189,248,0.07);
}
.opt:hover:not(:disabled)::before{opacity:1;}
.opt-key{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;
  color:var(--accent);min-width:22px;margin-top:3px;
  text-shadow:0 0 12px rgba(56,189,248,0.5);flex-shrink:0;
}
.opt-txt{flex:1;line-height:1.55;position:relative;z-index:1;}
.opt.correct{
  border-color:rgba(34,197,94,0.8);
  background:rgba(34,197,94,0.08);
}
.opt.correct .opt-key{color:var(--green);text-shadow:0 0 12px rgba(34,197,94,0.5);}
.opt.wrong{
  border-color:rgba(239,68,68,0.8);
  background:rgba(239,68,68,0.08);
}
.opt.wrong .opt-key{color:var(--red);}
.opt:disabled{cursor:default;}

/* EXPLANATION */
.exp-box{
  display:none;
  background:linear-gradient(135deg,rgba(251,191,36,0.07),rgba(251,191,36,0.03));
  border:1px solid rgba(251,191,36,0.3);
  border-radius:14px;padding:16px 20px;
  font-size:13px;line-height:1.7;color:#fde68a;
  margin-bottom:20px;
  animation:fadeIn .25s ease;
}
.exp-box.show{display:block;}
.exp-box strong{color:var(--gold);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.btn-next{
  display:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:white;padding:13px 32px;border-radius:12px;
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;cursor:pointer;
  box-shadow:0 8px 24px rgba(37,99,235,0.4);transition:.25s;
}
.btn-next.show{display:inline-block;}
.btn-next:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(37,99,235,0.55);}

/* ── RESULT ── */
.result-wrap{max-width:640px;margin:0 auto;padding:120px 20px 80px;text-align:center;}
.result-card{
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:28px;padding:56px 40px;
  backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;animation:fadeUp .35s ease;
}
.result-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 20%,rgba(56,189,248,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.res-emoji{font-size:52px;margin-bottom:18px;display:block;}
.res-pct{
  font-family:'Orbitron',sans-serif;font-size:80px;font-weight:900;
  line-height:1;margin-bottom:8px;letter-spacing:-2px;
  text-shadow:0 0 40px currentColor;
}
.res-sub{font-size:15px;color:var(--muted);margin-bottom:36px;font-weight:600;}
.res-chips{display:flex;gap:12px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.res-chip{
  padding:10px 22px;border-radius:12px;font-size:13px;font-weight:700;
  font-family:'Orbitron',sans-serif;letter-spacing:0.5px;border:1px solid;
}
.res-chip.g{border-color:rgba(34,197,94,0.5);color:var(--green);background:rgba(34,197,94,0.1);}
.res-chip.r{border-color:rgba(239,68,68,0.5);color:var(--red);background:rgba(239,68,68,0.1);}
.res-chip.b{border-color:rgba(56,189,248,0.5);color:var(--accent);background:rgba(56,189,248,0.1);}
.res-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.res-btn{
  padding:12px 26px;border-radius:12px;font-size:13px;font-weight:700;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:.25s;
}
.res-btn.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:white;box-shadow:0 8px 24px rgba(37,99,235,0.4);
}
.res-btn.primary:hover{transform:translateY(-3px);}
.res-btn.secondary{
  background:var(--glass);border:1px solid var(--glass-b);color:white;
}
.res-btn.secondary:hover{border-color:var(--accent);color:var(--accent);}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.7);}}

/* RESPONSIVE */
@media(max-width:640px){
  header{padding:14px 20px;}
  .home-wrap,.quiz-wrap{padding:90px 16px 60px;}
  .topic-grid{grid-template-columns:1fr;}
  .q-card{padding:22px 18px;}
  .res-pct{font-size:60px;}
}
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div id="mouse-glow"></div>

<header>
  <a class="logo" href="index.html">QAINAR</a>

<!-- HOME -->
<div id="homeScreen" class="screen active">

      <button class="mode-pill on" onclick="setFilter('all',this)">Барлығы</button>

    </div>

<!-- QUIZ -->
<div id="quizScreen" class="screen">
  <div class="quiz-wrap">
    <div class="quiz-topbar">
      <div class="qbar-info">
        <div class="qbar-label" id="qbarLabel">Тест</div>

    <div class="opts" id="optsWrap"></div>
    <div class="exp-box" id="expBox"></div>
    <button class="btn-next" id="btnNext" onclick="next()">КЕЛЕСІ →</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-wrap">
    <div class="result-card">
      <span class="res-emoji" id="resEmoji">🎯</span>
      <div class="res-pct" id="resPct">—</div>
      <div class="res-sub" id="resSub">—</div>
      <div class="res-chips" id="resChips"></div>
      <div class="res-btns">
        <button class="res-btn primary" onclick="retryWrong()">✗ Қателерді қайта жаса</button>
        <button class="res-btn secondary" onclick="goHome()">↺ Басты бет</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STAR BACKGROUND (same as kainar.space)
// ═══════════════════════════════════════════
(function(){
  const canvas=document.getElementById('star-canvas'),ctx=canvas.getContext('2d');
  let W,H,stars=[];
  const glow=document.getElementById('mouse-glow');
  document.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function init(){stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,phase:Math.random()*Math.PI*2,speed:Math.random()*0.004+0.001});}
  let t=0;
  function draw(){ctx.clearRect(0,0,W,H);t+=0.012;
    stars.forEach(s=>{const a=0.3+0.6*Math.abs(Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,210,255,${a})`;ctx.fill();});
    requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();

// ═══════════════════════════════════════════
//  QUESTION BANK
// ═══════════════════════════════════════════
const TOPICS = [
  {id:1,title:'Ішкі күш факторлары',cat:'theory',qs:[
    {q:'Сырықтағы ішкі күш факторлары нешеу және олар қандай?',opts:['Екеу: N және Q','Төртеу: N, Q, M, Мб','Алтау: N, Qx, Qy, Mx, My, Mz','Үшеу: N, Q, M'],ans:2,exp:'<strong>Алты ішкі күш факторы:</strong> N — бойлық күш, Qx, Qy — көлденең күштер, Mx, My — июші моменттер, Mz (Мб) — бұраушы момент.',formula:'N · Qx · Qy · Mx · My · Mz'},
    {q:'Қию әдісінде тепе-теңдік теңдеулері жазылады:',opts:['∑Fx=0 ғана','∑F=0 және ∑M=0 — барлығы 6 теңдеу','Тек ∑M=0','σ = N/A'],ans:1,exp:'<strong>Қию әдісінде</strong> 6 тепе-теңдік теңдеуі: ∑Fx=0, ∑Fy=0, ∑Fz=0 және ∑Mx=0, ∑My=0, ∑Mz=0.',formula:'∑Fx=0, ∑Fy=0, ∑Fz=0, ∑Mx=0, ∑My=0, ∑Mz=0'},
    {q:'N > 0 болса сырық қандай жүктеме астында?',opts:['Сығылуда','Июде','Созылуда','Бұралуда'],ans:2,exp:'<strong>Таңба ережесі:</strong> N > 0 → созылу, N < 0 → сығылу.',formula:'N > 0 → созылу | N < 0 → сығылу'},
    {q:'Ішкі күш факторлары қалай анықталады?',opts:['Тіректерден','Гук заңынан','Қию әдісімен — сырық кесіліп, бір бөлік үшін тепе-теңдік жазылады','Эпюра бойынша'],ans:2,exp:'<strong>Қию әдісі:</strong> сырық ойша кесіледі, бір бөлік алынады, оған қолданылатын күштер мен ішкі күш факторлары үшін тепе-теңдік жазылады.',formula:'Қию → тепе-теңдік → N, Q, M, Мб'},
  ]},
  {id:2,title:'Кернеу мен деформация',cat:'theory',qs:[
    {q:'Созылу кезіндегі тік кернеу формуласы?',opts:['σ = M/Wx','σ = Q/A','σ = N/A','σ = Мб/Wp'],ans:2,exp:'<strong>Тік кернеу:</strong> σ = N/A, N — бойлық күш (Н), A — қима ауданы (м²). Бірлігі Па немесе МПа.',formula:'σ = N / A  [Па = Н/м²]'},
    {q:'Гук заңы серпімді аймақта:',opts:['σ = E/ε','σ = ε/E','σ = E·ε','E = σ + ε'],ans:2,exp:'<strong>Гук заңы:</strong> σ = E·ε. E — серпімділік модулі. Болатта E ≈ 2×10⁵ МПа.',formula:'σ = E · ε   →   E = σ/ε'},
    {q:'Салыстырмалы деформация ε формуласы:',opts:['ε = Δl·l₀','ε = l₀/Δl','ε = Δl/l₀','ε = l₀−l₁'],ans:2,exp:'<strong>Деформация:</strong> ε = Δl/l₀ = (l₁−l₀)/l₀. Созылуда ε > 0, сығылуда ε < 0.',formula:'ε = Δl / l₀ = (l₁ − l₀) / l₀'},
    {q:'Серпімді және пластикалық деформация айырмашылығы:',opts:['Серпімді — қалдық қалады; пластикалық — қайта оралады','Серпімді — бастапқы қалпына оралады; пластикалық — қалдық деформация қалады','Айырмашылық жоқ','Серпімді тек сығылуда'],ans:1,exp:'<strong>Серпімді:</strong> күш алынса дене бастапқы қалпына оралады. <strong>Пластикалық:</strong> қалдық деформация қалады.',formula:'σ ≤ σ_уп → серпімді (қайта оралады)'},
  ]},
  {id:3,title:'Бойлық күш эпюрасы',cat:'theory',qs:[
    {q:'Бойлық күш эпюрасын тұрғызу үшін тепе-теңдік теңдеуі:',opts:['∑Fy=0','∑Mz=0','∑Fx=0','∑My=0'],ans:2,exp:'<strong>Бойлық күш N</strong> x-өсі бойынша. Тепе-теңдік: ∑Fx = 0.',formula:'∑Fx = 0  →  N табылады'},
    {q:'Шоғырланған бойлық күш түскен нүктеде N эпюрасы:',opts:['Бірқалыпты өзгереді','Секіреді — секіріс күшке тең','Нөлге тең болады','Параболамен өзгереді'],ans:1,exp:'<strong>Шоғырланған P</strong> N эпюрасында секіріс тудырады. Аралықта сыртқы күш болмаса N = const.',formula:'Шоғырланған P → ΔN = P'},
    {q:'Бойлық күш эпюрасы не үшін қажет?',opts:['Тек реакцияларды табу','Қауіпті қиманы анықтауға, σ = N/A ≤ [σ] тексеруге','Тек деформацияны есептеуге','Тіректер санын анықтауға'],ans:1,exp:'<strong>Эпюраның мақсаты:</strong> N_max болатын жер — қауіпті қима. σ = N_max/A ≤ [σ] шарты тексеріледі.',formula:'N_max → σ_max = N_max/A ≤ [σ]'},
  ]},
  {id:4,title:'Бұраушы момент эпюрасы',cat:'theory',qs:[
    {q:'Бұраушы момент Мб сырықты қайда бұрайды?',opts:['y-өсі айналасында','Бойлық (z) өсі айналасында','x-өсі айналасында','Тірек реакциялары айналасында'],ans:1,exp:'<strong>Мб</strong> сырықты өзінің бойлық өсінің айналасында бұрайды. Тепе-теңдік: ∑Mz = 0.',formula:'∑Mz = 0  →  Мб табылады'},
    {q:'Аралықта сыртқы бұраушы момент болмаса Мб эпюрасы:',opts:['Параболамен өзгереді','Нөлге тең','Тұрақты (горизонталь сызық)','Сызықты өседі'],ans:2,exp:'<strong>Тұрақты Мб:</strong> сыртқы момент болмаса Мб = const. Момент түскен нүктеде секіреді.',formula:'Сыртқы Мб = 0  →  Мб = const'},
    {q:'Мб₁ = 6 кН·м, одан кейін 2 кН·м қарама-қарсы берілген. Мб₂ = ?',opts:['8 кН·м','6 кН·м','4 кН·м','2 кН·м'],ans:2,exp:'<strong>Секіріс:</strong> ∑Mz = 0 бойынша, Мб₂ = 6 − 2 = 4 кН·м.',formula:'Мб₂ = 6 − 2 = 4 кН·м'},
  ]},
  {id:5,title:'Q және M эпюралары',cat:'theory',qs:[
    {q:'Q және M эпюраларын тұрғызу тепе-теңдік теңдеулері:',opts:['∑Fx=0 және ∑Fz=0','∑Fy=0 (Q үшін) және ∑M=0 (M үшін)','Тек ∑M=0','∑F=0 ғана'],ans:1,exp:'<strong>Q және M:</strong> Q — ∑Fy = 0, M — ∑M = 0. Алдымен тірек реакциялары RA, RB анықталады.',formula:'∑Fy = 0 → Q;   ∑M = 0 → M'},
    {q:'Q = 0 болатын нүктеде июші момент M не болады?',opts:['M = 0','M секіреді','M экстремумға жетеді','M тұрақты'],ans:2,exp:'<strong>Маңызды байланыс:</strong> dM/dx = Q. Q = 0 нүктесінде M экстремум — бұл қауіпті қиманы табудың тәсілі.',formula:'dM/dx = Q  →  Q=0 жерде M = экстремум'},
    {q:'Аралықта таралған жүктеме q болса Q эпюрасы:',opts:['Q тұрақты','Q параболамен','Q сызықты өзгереді','Q нөлге тең'],ans:2,exp:'<strong>Таралған q:</strong> Q сызықты өзгереді (еңісі = q). M — парабола. Жүктемесіз аралықта Q = const, M — сызық.',formula:'dQ/dx = −q  →  Q сызықты; M парабола'},
    {q:'Симметриялы жүктелген арқалықта P = 20 кН, RA = ?',opts:['20 кН','10 кН','5 кН','40 кН'],ans:1,exp:'<strong>Симметрия:</strong> RA = RB = P/2 = 10 кН.',formula:'RA = RB = P/2 = 10 кН'},
  ]},
  {id:6,title:'Механикалық сипаттамалар',cat:'theory',qs:[
    {q:'Созылу сынағында серпімділік модулі E:',opts:['E = F·l₀','E = σ/ε','E = A·Δl','E = F·A/Δl'],ans:1,exp:'<strong>E = σ/ε.</strong> Диаграммада пропорционалдық аймақтың еңісі E береді. Болатта E ≈ 2·10⁵ МПа.',formula:'E = σ/ε  [МПа немесе ГПа]'},
    {q:'Аққыштық алаңы дегеніміз не?',opts:['Кернеу пропорционалды өскен аймақ','Кернеу өсімсіз деформация ұлғаятын аймақ (σт)','Материал жарылар алдындағы аймақ','Серпімділік шегі'],ans:1,exp:'<strong>Аққыштық алаңы (σт):</strong> σт — кернеу іс жүзінде өспей, деформация бірден ұлғаяды.',formula:'σт — аққыштық шегі'},
    {q:'Беріктік шегі σу (σв) дегеніміз не?',opts:['Серпімді деформация аяқталатын нүкте','Аққыштық алаңының басы','σ−ε диаграммасының максимумы','Үзілу кезіндегі кернеу'],ans:2,exp:'<strong>σу:</strong> σ−ε диаграммасының максимумы. Рұқсат кернеу: [σ] = σу/n.',formula:'[σ] = σу/n  немесе  [σ] = σт/n'},
  ]},
  {id:7,title:'Созылу-сығылуда беріктік',cat:'theory',qs:[
    {q:'Созылу-сығылудағы беріктік шарты:',opts:['σ = N·A ≤ [σ]','σ = N/A ≥ [σ]','σ_max = N_max/A ≤ [σ]','σ = A/N ≤ [σ]'],ans:2,exp:'<strong>Беріктік шарты:</strong> σ_max = N_max/A ≤ [σ]. Мағынасы: нақты кернеу рұқсат кернеуден аспауы керек.',formula:'σ_max = N_max / A  ≤  [σ]'},
    {q:'Қажетті қима ауданын табу формуласы:',opts:['A ≤ N_max/[σ]','A ≥ N_max/[σ]','A = N_max·[σ]','A = [σ]/N_max'],ans:1,exp:'<strong>A_min:</strong> σ ≤ [σ] → N/A ≤ [σ] → A ≥ N_max/[σ].',formula:'A_min = N_max / [σ]'},
    {q:'Рұқсат etілген күші [F] = ?',opts:['[F] = A/[σ]','[F] = A+[σ]','[F] = [σ]·A','[F] = [σ]/A'],ans:2,exp:'<strong>Рұқсат күші:</strong> F/A ≤ [σ] → F ≤ [σ]·A → [F] = [σ]·A.',formula:'[F] = [σ] · A'},
    {q:'Беріктікке тексеру есебі дегені:',opts:['Қима өлшемін табу','σ = N_max/A есептеп, σ ≤ [σ] тексеру','Рұқсат күшін анықтау','Деформацияны анықтау'],ans:1,exp:'<strong>Тексеру:</strong> N_max, A, [σ] белгілі → σ = N_max/A → σ ≤ [σ]? Ия → берік.',formula:'σ = N_max/A  →  σ ≤ [σ]?'},
  ]},
  {id:8,title:'Бұралу кернеулері',cat:'theory',qs:[
    {q:'Дөңгелек қимадағы бұралу кернеуі:',opts:['τ = Мб·Jp','τ_max = Мб/Wp','τ = M/Wx','τ = N/A'],ans:1,exp:'<strong>τ_max = Мб/Wp.</strong> τ = Мб·ρ/Jp — орта нүктеде, максимал — сыртқы жиекте.',formula:'τ_max = Мб / Wp'},
    {q:'Дөңгелек қима Wp = ?',opts:['Wp = πd⁴/32','Wp = πd³/16','Wp = πd²/4','Wp = πd³/32'],ans:1,exp:'<strong>Дөңгелек қима:</strong> Jp = πd⁴/32, Wp = Jp/r = πd³/16.',formula:'Wp = πd³/16'},
    {q:'Бұралу кернеуі қима бойынша таралуы:',opts:['Біркелкі','Ортада максималды','Центрде нөл, жиекте максималды — сызықты','Тек жиекте'],ans:2,exp:'<strong>Таралу:</strong> τ = Мб·ρ/Jp → ρ = 0 орталықта τ = 0; ρ = r жиекте τ = τ_max. Сызықты таралу.',formula:'ρ = 0 → τ = 0;   ρ = r → τ = τ_max'},
  ]},
  {id:9,title:'Бұралуда беріктік пен қатаңдық',cat:'theory',qs:[
    {q:'Бұралуда беріктік шарты:',opts:['φ ≤ [φ]','σ = N/A ≤ [σ]','τ_max = Мб_max/Wp ≤ [τ]','Мб/Jp ≤ [τ]'],ans:2,exp:'<strong>Беріктік:</strong> τ_max = Мб_max/Wp ≤ [τ].',formula:'τ_max = Мб_max / Wp  ≤  [τ]'},
    {q:'Бұралуда қатаңдық шарты:',opts:['φ = Мб·l/(G·Jp) ≤ [φ]','φ_уд = Мб/(G·Jp) ≤ [φ_уд]','φ_уд = G·Jp/Мб ≤ [φ_уд]','τ = Мб/Wp ≤ [τ]'],ans:1,exp:'<strong>Қатаңдық:</strong> φ_уд = Мб/(G·Jp) ≤ [φ_уд]. G — ығысу модулі (болатта G ≈ 8·10⁴ МПа).',formula:'φ_уд = Мб/(G·Jp)  ≤  [φ_уд]  [рад/м]'},
    {q:'В нүктесінің бұралу бұрышы:',opts:['φ_B = Мб/(G·A)','φ_B = ∑Мб_i·l_i/(G·Jp)','φ_B = Мб·Jp/G','φ_B = M/(E·I)'],ans:1,exp:'<strong>Бұралу бұрышы:</strong> В нүктесіне дейінгі аралықтар бойынша қосылады.',formula:'φ_B = ∑ Мб_i · l_i / (G · Jp)'},
  ]},
  {id:10,title:'Иілу кернеулері',cat:'theory',qs:[
    {q:'Таза иілудегі тік кернеу:',opts:['σ = Q·y/I','σ = N/A','σ = M·y/I','σ = Мб·ρ/Jp'],ans:2,exp:'<strong>Иілудегі σ = M·y/I.</strong> Максимал: σ_max = M/Wx. Бейтарап осьте y = 0 → σ = 0.',formula:'σ = M·y/I,   σ_max = M/Wx'},
    {q:'Тіктөртбұрышты қима беріктік моменті Wx = ?',opts:['Wx = bh²/12','Wx = b²h/6','Wx = bh²/6','Wx = bh³/12'],ans:2,exp:'<strong>Тіктөртбұрышты:</strong> Ix = bh³/12, Wx = Ix/y_max = bh²/6.',formula:'Wx = bh²/6  (тіктөртбұрышты)'},
    {q:'Бейтарап ось иілу кезінде:',opts:['Кернеу максималды болатын сызық','Кернеу нөл болатын сызық','Жүктеме түскен нүктелер','Тіректер арасы'],ans:1,exp:'<strong>Бейтарап ось:</strong> σ = M·y/I = 0 болатын қима. y = 0 → σ = 0.',formula:'y = 0  →  σ = 0  (бейтарап ось)'},
  ]},
  {id:11,title:'Иілуде беріктік',cat:'theory',qs:[
    {q:'Иілуде беріктік шарты:',opts:['τ_max = Q·S/(I·b) ≤ [τ]','φ ≤ [φ]','σ_max = M_max/Wx ≤ [σ]','N_max/A ≤ [σ]'],ans:2,exp:'<strong>Иілуде беріктік:</strong> σ_max = M_max/Wx ≤ [σ].',formula:'σ_max = M_max / Wx  ≤  [σ]'},
    {q:'Дөңгелек қималы арқалық диаметрі:',opts:['d = M_max/[σ]','d ≥ ∛(32·M_max/(π·[σ]))','d = √(4M_max/(π[σ]))','d² = M_max/[σ]'],ans:1,exp:'<strong>Дөңгелек:</strong> Wx = πd³/32 → d ≥ ∛(32·M_max/(π·[σ])).',formula:'d ≥ ∛(32·M_max / (π·[σ]))'},
    {q:'Иілудегі жанама кернеу τ:',opts:['τ = M·y/I','τ = Мб/Wp','τ = Q·S/(I·b)','τ = N/A'],ans:2,exp:'<strong>Жанама кернеу:</strong> τ = Q·S/(I·b). Бейтарап осьте τ = τ_max.',formula:'τ = Q·S / (I·b)'},
  ]},
  {id:12,title:'Мор интегралы',cat:'theory',qs:[
    {q:'Мор интегралы не есептейді?',opts:['Кернеуді','Белгілі нүктенің орын ауысуын','Реакцияларды','Серпімділік модулін'],ans:1,exp:'<strong>Мор интегралы:</strong> δ = ∫M̄·Mp/(EI)dx — нүктенің орын ауысуын табады.',formula:'δ = ∫M̄·Mp / (EI) dx'},
    {q:'Верещагин ережесі (Мор интегралын жеңілдету):',opts:['δ = ω̄·yс/(EI) — M̄ ауданы × Mp ординатасы','δ = ω·ȳс/(EI) — Mp ауданы × M̄ ординатасы','δ = M̄·Mp·l/(EI)','Тек үшбұрышты эпюрада'],ans:1,exp:'<strong>Верещагин:</strong> δ = ω·ȳс/(EI). ω — Mp эпюрасының ауданы, ȳс — сол ауданның центрінен M̄ ординатасы.',formula:'δ = ω · ȳс / (EI)'},
    {q:'М̄ (бірлік момент) дегеніміз не?',opts:['Нақты жүктемеден болатын момент','F = 1 бірлік күштен болатын момент','Рұқсат etілген момент','Максималды момент'],ans:1,exp:'<strong>М̄:</strong> орын ауысуын табқымыз келген нүктеге F = 1 бірлік күш қою арқылы алынатын момент.',formula:'M̄ → F=1;   Mp → нақты жүктеме'},
  ]},
  {id:13,title:'Статикалық анықталмаған жүйе',cat:'theory',qs:[
    {q:'Статикалық анықталмау дәрежесі n = 2 дегені:',opts:['2 теңдеу жазылады','2 сыртқы күш бар','2 артық байланыс бар — 2 реакция табылмайды','Тек 2 тіректі жүйе'],ans:2,exp:'<strong>n = r − s.</strong> n = 2 → 2 артық байланыс. Шешу үшін деформация шарттары керек.',formula:'n = r − s  (r — белгісіздер, s — теңдеулер)'},
    {q:'"Артық байланыс" дегеніміз:',opts:['Жүйені бұзатын байланыс','Тепе-теңдік үшін міндетті емес, бірақ бар қосымша байланыс','Тіректерді байланыстыратын сызық','Сыртқы жүктеме'],ans:1,exp:'<strong>Артық байланыс:</strong> алып тастасаң да жүйе тепе-теңдікте, бірақ деформация шарттары бұзылады.',formula:'n = 1 → 1 артық байланыс → 1 қосымша теңдеу'},

    {q:'Консоль (бір қатаң, бірі бос) μ = ?',opts:['μ = 0.5','μ = 0.7','μ = 1','μ = 2'],ans:3,exp:'<strong>Консоль:</strong> μ = 2. Pcr ең кіші. Тиімді ұзындық = 2l.',formula:'Консоль → μ = 2 → Pcr ең кіші'},
    {q:'Pcr ең ҮЛКЕН болатын бекіту:',opts:['Екі шарнир (μ=1)','Консоль (μ=2)','Екі қатаң (μ=0.5)','Бір қатаң+шарнир (μ≈0.7)'],ans:2,exp:'<strong>Pcr ∼ 1/(μl)².</strong> Екі қатаң μ = 0.5 — ең кіші μ → Pcr ең үлкен.',formula:'μ = 0.5 → Pcr = π²EI/(0.5l)² = 4·π²EI/l²'},
    {q:'Бекіту коэффициенттері кестесі:',opts:['Екі шарнир=1; Консоль=2; Екі қатаң=0.5; Бір қатаң+шарнир≈0.7','Екі шарнир=2; Консоль=1; Екі қатаң=0.7','Барлығы μ=1','Екі шарнир=0.5; Консоль=1'],ans:0,exp:'<strong>Кесте:</strong> екі шарнир = 1, консоль (қатаң+бос) = 2, екі қатаң = 0.5, бір қатаң+шарнир ≈ 0.7.',formula:'μ: 0.5 → 0.7 → 1 → 2  (беріктен нашарға)'},
  ]},
  {id:18,title:'Эйлер шегі. Ясинский',cat:'theory',qs:[
    {q:'Эйлер формуласы қолданылмайтын жағдай:',opts:['λ ≥ λlim (ұзын, иілгіш)','λ < λlim (қысқа немесе орташа)','μ = 1 болғанда','Imin үлкен болғанда'],ans:1,exp:'<strong>Эйлер шегі:</strong> тек λ ≥ λlim болғанда дұрыс. Болатта λlim ≈ 100.',formula:'λ ≥ λlim → Эйлер;  λ < λlim → Ясинский'},
    {q:'Ясинский формуласы:',opts:['σcr = π²E/λ²','σcr = a − b·λ','σcr = E/λ','σcr = a + b·λ'],ans:1,exp:'<strong>Ясинский:</strong> σcr = a − b·λ. a, b — материал коэффициенттері. Pcr = σcr·A.',formula:'σcr = a − b·λ,  Pcr = σcr · A'},
    {q:'Pcr табылғаннан кейін орнықтылыққа тексеру:',opts:['P = Pcr','P ≥ Pcr/n','P ≤ Pcr/n (n — орнықтылық коэффициенті)','P = [σ]·A'],ans:2,exp:'<strong>Тексеру:</strong> P ≤ Pcr/n, n = 1.5…3.',formula:'P ≤ Pcr/n  немесе  σ ≤ σcr/n'},
  ]},
  {id:19,title:'Дағдарыс күш есебі',cat:'theory',qs:[
    {q:'E=2×10⁵ МПа, l=2π м, Imin=114 см⁴, μ=1. Pcr ≈ ?',opts:['≈570 кН','≈28.5 кН','≈142 кН','≈285 кН'],ans:1,exp:'<strong>Pcr = π²EI/(μl)²</strong> = π²·2×10¹¹·114×10⁻⁸/(2π)² = 2×10¹¹·114×10⁻⁸/4 ≈ 28 500 Н = <strong>28.5 кН</strong>.',formula:'Pcr = π²·2×10¹¹·114×10⁻⁸/(2π)² ≈ 28.5 кН'},
    {q:'E=2×10⁵ МПа, l=1 м, Imin=260 см⁴, μ=1. Pcr ≈ ?',opts:['≈51 кН','≈512 кН','≈5120 кН','≈128 кН'],ans:1,exp:'<strong>Pcr = π²·2×10¹¹·260×10⁻⁸/1²</strong> = 9.87·52 000 ≈ 513 000 Н = <strong>512 кН</strong>.',formula:'Pcr = π²·E·I/l² ≈ 512 кН'},
    {q:'Pcr есебінде μ коэффициентінің мағынасы:',opts:['μ тек таңбаны анықтайды','μ үлкен (нашар бекіту) → Pcr кіші — сырық оңай майысады','μ Pcr-ге әсер etпейді','μ тек Ясинскийде'],ans:1,exp:'<strong>μ физикасы:</strong> μl — тиімді ұзындық. Бекіту нашар → μ үлкен → Pcr кіші.',formula:'μ↑ → μl↑ → Pcr = π²EI/(μl)² ↓'},
  ]},
  {id:20,title:'Гипотезалар мен принциптер',cat:'theory',qs:[
    {q:'"Материал қасиеттері барлық бағытта бірдей" — қандай гипотеза?',opts:['Үздіксіздік','Біртектілік','Изотроптылық','Жазық қималар'],ans:2,exp:'<strong>Изотроптылық:</strong> барлық бағытта бірдей. Біртектілік — барлық нүктеде бірдей.',formula:'Изотроп: E_x = E_y = E_z'},
    {q:'"Жазық қима деформациядан кейін де жазық" — қандай гипотеза?',opts:['Кіші деформациялар','Үздіксіздік','Жазық қималар (Бернулли)','Изотроптылық'],ans:2,exp:'<strong>Бернулли гипотезасы:</strong> иілу және бұралу есептерінде негіз. Осысыз σ = M·y/I шығарылмас.',formula:'Жазық қима → σ = M·y/I'},
    {q:'"Бірнеше күш жалпы әсері — жеке әсерлер қосындысы":',opts:['Гук заңы','Паскаль принципі','Суперпозиция принципі','Сен-Венан принципі'],ans:2,exp:'<strong>Суперпозиция:</strong> серпімді аймақта σ_жалпы = σ₁ + σ₂ + ... Гук заңы орындалуы шарт.',formula:'σ_жалпы = σ₁ + σ₂ + ...'},
    {q:'"Жүктеме берілу тәсілі алыста аз маңызды" — не?',opts:['Гук заңы','Бернулли гипотезасы','Сен-Венан принципі','Изотроптылық'],ans:2,exp:'<strong>Сен-Венан:</strong> жүктеме аймағынан алыста (>3–5 өлшемнен) жүктемені балама күшпен алмастыруға болады.',formula:'Сен-Венан: алыста жүктемені ауыстыруға болады'},
  ]},
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let pool=[],cur=0,sc={ok:0,bad:0},answered=false,wrongs=[],filterCat='all',quizTitle='';

// ═══════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════
function setFilter(cat,btn){
  filterCat=cat;
  document.querySelectorAll('.mode-pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTopics();
}

function renderTopics(){
  const src=filterCat==='all'?TOPICS:TOPICS.filter(t=>t.cat===filterCat);
  document.getElementById('topicGrid').innerHTML=src.map(t=>`
    <div class="topic-card">
      <div class="tc-head">
        <div class="tc-num">${t.qs.length}</div>
        <div class="tc-badge">${t.cat==='theory'?'ТЕОРИЯ':'ЕСЕП'}</div>
      </div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-sub">${t.qs.length} сұрақ</div>
      <button class="tc-btn" onclick="begin('${t.title.replace(/'/g,"\\'")}')">▶ Бастау</button>
    </div>
  `).join('');
}

function begin(topicTitle){
  const src=filterCat==='all'?TOPICS:TOPICS.filter(t=>t.cat===filterCat);
  let items;
  if(!topicTitle){
    items=src.flatMap(t=>t.qs.map(q=>({...q,topic:t.title})));
    quizTitle='Аралас тест';
  }else{
    const topic=TOPICS.find(t=>t.title===topicTitle);
    items=topic.qs.map(q=>({...q,topic:topic.title}));
    quizTitle=topicTitle;
  }
  pool=shuffle([...items]);
  sc={ok:0,bad:0};cur=0;wrongs=[];
  show('quizScreen');loadQ();
}

function goHome(){show('homeScreen');}

// ═══════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════
function loadQ(){
  answered=false;
  const q=pool[cur],total=pool.length;
  document.getElementById('qbarLabel').textContent=quizTitle;
  document.getElementById('qbarTitle').textContent=q.topic;
  document.getElementById('qbarFill').style.width=`${(cur/total)*100}%`;
  document.getElementById('sOk').textContent=sc.ok;
  document.getElementById('sBad').textContent=sc.bad;
  document.getElementById('qNum').textContent=`${cur+1} / ${total}`;
  document.getElementById('qTopic').textContent=q.topic.toUpperCase();
  document.getElementById('qText').textContent=q.q;
  const fEl=document.getElementById('qFormula');
  if(q.formula){fEl.textContent=q.formula;fEl.style.display='block';}
  else fEl.style.display='none';
  const keys=['A','B','C','D'];
  document.getElementById('optsWrap').innerHTML=q.opts.map((o,i)=>`
    <button class="opt" id="o${i}" onclick="pick(${i})">
      <span class="opt-key">${keys[i]}</span>
      <span class="opt-txt">${o}</span>
    </button>
  `).join('');
  document.getElementById('expBox').className='exp-box';
  document.getElementById('btnNext').className='btn-next';
  const card=document.getElementById('qCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='';
}

function pick(i){
  if(answered)return;
  answered=true;
  const q=pool[cur];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById('o'+q.ans).classList.add('correct');
  if(i!==q.ans){document.getElementById('o'+i).classList.add('wrong');sc.bad++;wrongs.push(q);}
  else sc.ok++;
  document.getElementById('sOk').textContent=sc.ok;
  document.getElementById('sBad').textContent=sc.bad;
  const eb=document.getElementById('expBox');
  eb.innerHTML=q.exp;eb.className='exp-box show';
  document.getElementById('btnNext').className='btn-next show';
}

function next(){
  cur++;
  if(cur>=pool.length)showResult();
  else loadQ();
}

// ═══════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════
function showResult(){
  show('resultScreen');
  const pct=Math.round((sc.ok/pool.length)*100);
  const emoji=pct>=80?'🎉':pct>=60?'💪':pct>=40?'📚':'😅';
  const sub=pct>=80?'Тамаша! Емтиханға дайынсыз.':pct>=60?'Жақсы! Аз жетіспейді.':pct>=40?'Жалғастырыңыз!':'Қайта оқып шығыңыз.';
  document.getElementById('resEmoji').textContent=emoji;
  const el=document.getElementById('resPct');
  el.textContent=pct+'%';
  el.style.color=pct>=70?'#22c55e':pct>=50?'#38bdf8':'#ef4444';
  document.getElementById('resSub').textContent=sub;
  document.getElementById('resChips').innerHTML=`
    <div class="res-chip g">✓ Дұрыс: ${sc.ok}</div>
    <div class="res-chip r">✗ Қате: ${sc.bad}</div>
    <div class="res-chip b">Барлығы: ${pool.length}</div>
  `;
}

function retryWrong(){
  if(!wrongs.length){goHome();return;}
  pool=shuffle([...wrongs]);sc={ok:0,bad:0};cur=0;wrongs=[];
  quizTitle='Қателерді қайталау';
  show('quizScreen');loadQ();
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// INIT
renderTopics();
</script>
</body>
</html>
