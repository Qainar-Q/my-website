<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ҚДД емтихан | Qainar</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #020817;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 760px;
      padding: 36px;
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 14px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      color: white;
      text-decoration: none;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      padding: 12px 22px;
      border-radius: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Қатты дене механикасы емтиханға дайындық</h1>
    <p>
      Бұл бетте ҚДД емтиханына арналған теориялық сұрақтар, формулалар,
      түсіндірмелер және мысал есептер болады.
    </p>
    <a href="index.html">← Басты бетке қайту</a>
  </div>
</body>
</html>
